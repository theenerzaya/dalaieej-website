name: Gallery manifest

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate gallery manifest and fail if committed file is stale
        run: npm run check-gallery-images
